# Render deployment config for Zapply Chat backend
# This file tells Render how to build and run the server

services:
  - type: web
    name: zapply-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false  # Set to your Vercel URL
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: MOCK_OTP
        value: true
      - key: OTP_EXPIRY_MINUTES
        value: 2
