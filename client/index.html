<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Zapply Chat - Secure real-time messaging with E2E encryption, audio & video calls, status stories, and more." />
    <meta name="keywords" content="chat, messaging, secure, encrypted, calls, zapply" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Zapply Chat" />
    <meta property="og:description" content="The most secure messaging app. Chat, call, share — privately." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zapply" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Security headers via meta (backup for CSP) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- Polyfill global for browser dependencies -->
    <script>
      window.global = window;
      window.process = { env: {} };
    </script>
    
    <title>Zapply Chat — Secure Messaging</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('SW registered:', reg.scope);
          }).catch((err) => {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
